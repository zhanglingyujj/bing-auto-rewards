name: Bing Daily Check-in

on:
  schedule:
    # 每天凌晨 2:05 执行（避开整点高峰，减少延迟）
    - cron: '5 2 * * *'
  workflow_dispatch: 
  push:
    branches: [ main ]

jobs:
  bing-checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 签到任务通常不需要 5 小时，缩短超时时间以节省额度
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip' # 自动开启 pip 缓存，加快后续运行速度

    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Setup ChromeDriver
      uses: nanasess/setup-chromedriver@v2
      # 该 Action 会自动匹配 Chrome 版本，无需手动解析版本号

    - name: Verify Environment
      run: |
        google-chrome --version
        chromedriver --version
        echo "DISPLAY: $DISPLAY"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Create config directory
      run: mkdir -p config
      
    - name: Setup accounts configuration
      run: |
        # 使用 printf 避免特殊字符转义问题
        printf '%s' '${{ secrets.ACCOUNTS_CONFIG }}' > config/accounts.json
        
    - name: Run Bing automation
      env:
        PYTHONUNBUFFERED: 1
        # headless 模式通常不需要 Xvfb，但如果你的脚本强制依赖，可保留
        DISPLAY: :99
      run: |
        # 启动虚拟显示服务（如果脚本中使用了非 headless 模式）
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1920x1080x24 &
        python bingZDH.py --once
        
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bing-logs
        path: |
          *.log
          *.png
        retention-days: 7
